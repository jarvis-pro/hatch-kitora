name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      # pnpm version is read from `packageManager` in package.json (single source of truth).
      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Type-check
        run: pnpm typecheck

      # RFC 0003 PR-3 — keep `openapi/v1.yaml` in lockstep with `src/app/api/v1`.
      # `openapi:lint` validates the spec against OpenAPI 3.1 + redocly defaults;
      # `openapi:check` cross-checks every (method, path) on each side.
      - name: Lint OpenAPI spec
        run: pnpm openapi:lint

      - name: OpenAPI ↔ route coverage
        run: pnpm openapi:check

      - name: Build
        run: pnpm build
        env:
          # `.env` is committed and provides safe defaults for build-time env
          # validation. Real secrets are injected via platform env in deploy.
          NEXT_TELEMETRY_DISABLED: '1'

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kitora
          POSTGRES_PASSWORD: kitora
          POSTGRES_DB: kitora_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://kitora:kitora@localhost:5432/kitora_test
      AUTH_SECRET: 0123456789abcdef0123456789abcdef0123456789abcdef
      # Auth.js v5: AUTH_URL's protocol drives `useSecureCookies`. Without
      # this, `next start` (NODE_ENV=production) defaults Secure=true and the
      # session cookie is silently dropped by the browser on plain HTTP — the
      # exact failure mode that surfaces in e2e as "redirect to /login".
      AUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: 'true'
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_TELEMETRY_DISABLED: '1'

    steps:
      - uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Apply migrations
        run: pnpm db:deploy

      - name: Install Playwright browsers
        run: pnpm test:e2e:install

      - name: Build
        run: pnpm build

      - name: Run Playwright tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
